<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 92">

  <!--
    DrivAmor Mark
    Left half  = Drive / Arm  — sharp angular bicep peak  (#B82038)
    Right half = Amor / Heart — soft rounded curve        (#E8547A)
    Tied together as one unified shape
  -->

  <!-- LEFT: Drive / Bicep — angular, pointed peak = strength -->
  <path fill="#B82038" d="M50,84 C32,71 7,54 7,33 C7,12 21,2 38,8 C45,10 49,17 50,27 L50,84Z"/>

  <!-- RIGHT: Amor / Heart — soft, round peak = love -->
  <path fill="#E8547A" d="M50,84 L50,27 C51,17 55,10 62,8 C79,2 93,12 93,33 C93,54 68,71 50,84Z"/>

  <!-- Bicep definition line — muscle read at larger sizes -->
  <path fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.28"
        d="M 37,10 C 23,14 9,23 8,34"/>

  <!-- Center seam — unifies the two halves -->
  <line x1="50" y1="27" x2="50" y2="84" stroke="white" stroke-width="1" opacity="0.18"/>

</svg>
