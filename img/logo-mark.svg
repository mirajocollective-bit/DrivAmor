<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 102">

  <!--
    DrivAmor Mark
    LEFT  = flexed arm/bicep (Drive red)  — outer arm bulges left, bicep bump, concave inner arm
    RIGHT = heart curve     (Amor pink)   — smooth round classic heart arc
    Both meet at center top + bottom tip, tied as one unified shape
  -->

  <!-- LEFT: FLEXED ARM / BICEP — Drive red -->
  <!-- Path: up outer arm → bulges left (bicep) → concave inner arm back to center -->
  <path fill="#B82038" d="
    M 60,96
    C 44,84 18,68 14,50
    C 11,38 8,24 16,16
    C 22,10 32,10 40,16
    C 48,22 54,26 60,26
    L 60,96 Z
  "/>

  <!-- RIGHT: HEART CURVE — Amor pink -->
  <!-- Clean smooth arc — visually contrasts the angular left side -->
  <path fill="#E8547A" d="
    M 60,96
    L 60,26
    C 62,14 72,8 84,8
    C 98,8 110,18 110,36
    C 110,58 82,80 60,96 Z
  "/>

  <!-- Bicep definition line — the inner muscle edge that makes it read as a flexed arm -->
  <path fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.35"
        d="M 38,13 C 24,17 11,27 11,40"/>

</svg>
